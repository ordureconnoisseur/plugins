name: URL Switcher
description: Toggle between local Tailscale and Cloudflare tunnel access. Adds a nav button that sends you to the same page on the other URL.
version: 1.0.0
url: https://github.com/ordureconnoisseur/stash-plugins
ui:
  javascript:
    - urlSwitcher.js
  css:
    - urlSwitcher.css
settings:
  local_url:
    displayName: Local URL
    description: "Your local or Tailscale URL (e.g. http://100.80.203.49:9999). Must match exactly what appears in your browser address bar."
    type: STRING
  tunnel_url:
    displayName: Tunnel URL
    description: "Your Cloudflare tunnel URL (e.g. https://stash.yourdomain.com). Must match exactly what appears in your browser address bar."
    type: STRING
