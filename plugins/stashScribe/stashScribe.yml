name: Stash Scribe
description: LLM-driven review assistant for scenes and performers. Click a button on a scene or performer page; an Ollama-served model interviews you with quick questions, writes the review, and suggests per-criterion ratings (via the stash-advanced-rating plugin, when installed — handles both scene and performer criteria). Reviews write to the subject's Details (and custom_fields when supported); scores write back via the existing ★-tag format the rating plugin uses — no coupling between the plugins.
version: 0.3.3
url: https://github.com/ordureconnoisseur/stash-scribe
exec:
  - python
  - "{pluginDir}/stashScribe.py"
interface: raw
ui:
  javascript:
    - stashScribe.js
  css:
    - stashScribe.css
