name: Binge
description: Instagram-shaped social + discovery layer for Stash — stories, vertical reel, performer profiles, and StashDB-powered Follow/Discover.
version: 0.4.0
url: https://github.com/ordureconnoisseur/binge
ui:
  assets:
    /: .
  javascript:
    - binge.entry.js
settings:
