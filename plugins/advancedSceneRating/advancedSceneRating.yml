name: Advanced Scene Rating
description: Rate scenes across configurable criteria; the overall Stash rating is calculated from a weighted average. Configure groups, criteria, weights, and descriptions in the plugin settings panel.
version: 2.4.0
url: https://github.com/ordureconnoisseur/stash-advanced-scene-rating
exec:
  - python
  - "{pluginDir}/advancedSceneRating.py"
interface: raw
ui:
  javascript:
    - custom-rating-ui.js
  css:
    - custom-rating-ui.css
hooks:
  - name: Recalculate Rating on Update
    triggeredBy:
      - Scene.Update.Post
